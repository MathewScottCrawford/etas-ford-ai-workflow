# Purpose: Docker Compose stack — n8n + agent microservices
#
# NOTE: Ollama runs natively on the Windows host (models at D:\ollama).
#       Containers reach it via host.docker.internal:11434.
#       Do NOT run a containerized Ollama alongside the native instance —
#       port 11434 conflict will occur.
# =============================================================================

services:

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
      # Allow n8n HTTP nodes to reach native Ollama on the Windows host
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - n8n_n8n_data:/home/node/.n8n
      - ../workflows/n8n:/workflows:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  config-agent:
    build:
      context: ..
      dockerfile: agents/config_agent/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      # Points to native Ollama on Windows host, not a container
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi4-mini}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  requirements-agent:
    build:
      context: ..
      dockerfile: agents/requirements_agent/Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      # Points to native Ollama on Windows host, not a container
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi4-mini}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  n8n_n8n_data:
    external: true
    # Existing n8n volume containing workflows, credentials, execution history.
    # Created by standalone n8n run prior to Docker Compose setup.
    # Do NOT use 'docker compose down -v' — this would destroy workflow data.
